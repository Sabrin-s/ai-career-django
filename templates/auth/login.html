<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CareerAI — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{width:100%;max-width:420px;padding:0 16px}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{font-size:40px}
.logo h1{font-size:26px;font-weight:700;margin-top:8px}
.logo p{color:#64748b;margin-top:4px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:28px}
.tabs{display:flex;background:#f1f5f9;border-radius:8px;padding:4px;margin-bottom:24px}
.tab{flex:1;padding:8px;border:none;cursor:pointer;border-radius:6px;font-weight:600;font-size:14px;transition:all .15s;background:transparent;color:#64748b}
.tab.active{background:#fff;color:#4f46e5;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;color:#64748b}
.form-control{width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;color:#1e293b;transition:border-color .15s}
.form-control:focus{outline:none;border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.btn{width:100%;padding:10px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .15s}
.btn:hover{background:#3730a3}
.alert{padding:12px;border-radius:8px;font-size:13px;margin-bottom:16px;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.panel{display:none}.panel.active{display:block}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon">🚀</div>
    <h1>CareerAI</h1>
    <p>Your personal job-hunting engine</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="showTab('login',this)">Sign In</button>
      <button class="tab" onclick="showTab('register',this)">Register</button>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <div id="login" class="panel active">
      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" placeholder="••••••••" required/>
        </div>
        <button class="btn" type="submit">Sign In</button>
      </form>
    </div>

    <div id="register" class="panel">
      <form method="post" action="{% url 'register' %}">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-control" name="username" placeholder="johndoe" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" placeholder="••••••••" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input class="form-control" type="password" name="password2" placeholder="••••••••" required/>
        </div>
        <button class="btn" type="submit">Create Account</button>
      </form>
    </div>
  </div>
</div>
<script>
function showTab(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  btn.classList.add('active');
}
</script>
</body>
</html>
