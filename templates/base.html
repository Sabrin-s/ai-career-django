{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareerAI{% block title %}{% endblock %}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f8fafc;color:#1e293b;font-size:14px}
a{color:#4f46e5;text-decoration:none}
a:hover{text-decoration:underline}
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;min-height:100vh;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;padding:0}
.sidebar-logo{padding:20px;font-size:18px;font-weight:700;color:#4f46e5;border-bottom:1px solid #e2e8f0}
.sidebar-nav{flex:1;padding:12px 0}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#64748b;font-weight:500;border-left:3px solid transparent;transition:all .15s}
.sidebar-nav a:hover,.sidebar-nav a.active{color:#4f46e5;background:#eef2ff;border-left-color:#4f46e5;text-decoration:none}
.sidebar-footer{padding:16px 20px;border-top:1px solid #e2e8f0;font-size:12px;color:#64748b}
.sidebar-footer strong{color:#1e293b;display:block;margin-bottom:8px}
.main{flex:1;padding:28px 32px;overflow-y:auto}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.page-title{font-size:22px;font-weight:700}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:20px;margin-bottom:20px}
.card-title{font-size:16px;font-weight:600;margin-bottom:16px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:18px}
.stat-label{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-size:28px;font-weight:700;margin:4px 0}
.stat-sub{font-size:12px;color:#64748b}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;border:none;cursor:pointer;transition:all .15s;text-decoration:none}
.btn-primary{background:#4f46e5;color:#fff}.btn-primary:hover{background:#3730a3;text-decoration:none;color:#fff}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626;text-decoration:none;color:#fff}
.btn-outline{background:transparent;border:1px solid #e2e8f0;color:#1e293b}.btn-outline:hover{background:#f1f5f9;text-decoration:none}
.btn-sm{padding:5px 11px;font-size:12px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;color:#64748b}
.form-control{width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;background:#fff;color:#1e293b;transition:border-color .15s}
.form-control:focus{outline:none;border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
textarea.form-control{resize:vertical;min-height:90px}
select.form-control{cursor:pointer}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;text-transform:capitalize}
.badge-applied{background:#dbeafe;color:#1d4ed8}
.badge-interview{background:#fef3c7;color:#92400e}
.badge-technical{background:#ede9fe;color:#5b21b6}
.badge-offer{background:#d1fae5;color:#065f46}
.badge-rejected{background:#fee2e2;color:#991b1b}
.badge-saved{background:#f1f5f9;color:#475569}
.badge-withdrawn{background:#f1f5f9;color:#94a3b8}
.badge-phone_screen{background:#ecfdf5;color:#047857}
.alert{padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px}
.alert-error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.alert-success{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.alert-info{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
.skill-tag{display:inline-block;padding:3px 10px;background:#eef2ff;color:#4f46e5;border-radius:20px;font-size:12px;font-weight:500;margin:3px}
.skill-tag.missing{background:#fee2e2;color:#991b1b}
.skill-tag.matched{background:#d1fae5;color:#065f46}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;border-bottom:1px solid #e2e8f0;background:#f8fafc}
td{padding:12px;border-bottom:1px solid #e2e8f0;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.progress{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;margin:4px 0}
.progress-bar{height:100%;border-radius:4px;background:#4f46e5;transition:width .3s}
.empty-state{text-align:center;padding:40px;color:#64748b}
.empty-icon{font-size:36px;margin-bottom:12px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}.main{padding:16px}.sidebar{width:200px}}
</style>
</head>
<body>
<div class="layout">
<aside class="sidebar">
  <div class="sidebar-logo">🚀 CareerAI</div>
  <nav class="sidebar-nav">
    <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">📊 Dashboard</a>
    <a href="{% url 'resume' %}" class="{% if request.resolver_match.url_name == 'resume' %}active{% endif %}">📄 Resume</a>
    <a href="{% url 'jobs' %}" class="{% if request.resolver_match.url_name == 'jobs' %}active{% endif %}">💼 Job Tracker</a>
    <a href="{% url 'interview' %}" class="{% if request.resolver_match.url_name == 'interview' %}active{% endif %}">🎤 Mock Interview</a>
    <a href="{% url 'skills' %}" class="{% if request.resolver_match.url_name == 'skills' %}active{% endif %}">🧠 Skill Gap</a>
  </nav>
  <div class="sidebar-footer">
    <strong>{{ request.user.email }}</strong>
    <a href="{% url 'logout' %}" class="btn btn-outline btn-sm" style="width:100%;justify-content:center;margin-top:4px">Sign out</a>
  </div>
</aside>
<main class="main">
  {% for message in messages %}
    <div class="alert {% if message.tags == 'error' %}alert-error{% elif message.tags == 'success' %}alert-success{% else %}alert-info{% endif %}">
      {{ message }}
    </div>
  {% endfor %}
  {% block content %}{% endblock %}
</main>
</div>
</body>
</html>
